services:
  postgres:
    image: postgres:18-alpine
    container_name: xdd-momo-postgres
    ports:
      - '55432:5432'
    environment:
      POSTGRES_DB: momo
      POSTGRES_USER: momo
      POSTGRES_PASSWORD: momo
    healthcheck:
      test: [CMD-SHELL, pg_isready -U momo -d momo]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - momo-postgres-data:/var/lib/postgresql

  valkey:
    image: valkey/valkey:8-alpine
    container_name: xdd-momo-valkey
    ports:
      - '56379:6379'
    healthcheck:
      test: [CMD, valkey-cli, ping]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.46.1
    container_name: xdd-momo-meilisearch
    ports:
      - '57700:7700'
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: momo-meilisearch-development-master-key
    volumes:
      - momo-meilisearch-data:/meili_data

volumes:
  momo-postgres-data:
  momo-meilisearch-data:
