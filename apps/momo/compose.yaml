services:
  postgres:
    image: postgres:18-alpine
    container_name: xdd-momo-postgres
    ports:
      - '55432:5432'
    environment:
      POSTGRES_DB: momo
      POSTGRES_USER: momo
      POSTGRES_PASSWORD: momo
    healthcheck:
      test: [CMD-SHELL, pg_isready -U momo -d momo]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - momo-postgres-data:/var/lib/postgresql

volumes:
  momo-postgres-data:
