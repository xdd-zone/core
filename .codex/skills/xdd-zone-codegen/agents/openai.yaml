interface:
  display_name: "XDD Zone Starter"
  short_description: "先判断任务该看哪里、该调什么技能、再按当前结构实现"
  default_prompt: "当用户在当前仓库里提出“先看看这个仓库”“这次该从哪改”“先帮我定位相关文档和代码入口”“这个需求该走 packages/nexus 还是 packages/console”“按当前项目方式实现”“先别急着写代码，先判断落点”这类请求时，先使用 $xdd-zone-codegen 为当前 XDD Zone Core 任务建立项目上下文。先按任务类型读取最少必要的 README、docs 和目标包说明，再判断这次改动落在 packages/nexus、packages/console、auth、RBAC、Eden、OpenAPI、文案还是联调。命中 packages/nexus 时先调用 $elysiajs；命中 Console 界面时先读取 packages/console/.impeccable.md 并调用 $frontend-design；命中说明性文案时先调用 $write-xdd-docs。先完成分流和前置判断，再进入实现。实现时严格按当前仓库结构落地：Nexus 先改 model.ts，再改 service/repository，再改模块 index.ts；Console 直接复用 Eden Treaty、现有路由、导航、layout、access-control 和 i18n 结构，不新增旧式 contract、平行 API wrapper、第二套权限规则或第二套 HTTP 类型。"
