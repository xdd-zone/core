interface:
  display_name: "XDD Zone Codegen"
  short_description: "按仓库现有边界生成标准前后端代码"
  default_prompt: "使用 $xdd-zone-codegen 按当前仓库边界生成或修改代码，优先复用现有 contract、session、权限、路由、导航、主题和文档约定。项目处于早期阶段，除非用户明确要求兼容或过渡方案，否则默认直接重构到当前目标实现，不主动保留兼容层、旧接口行为、过渡开关或双写逻辑。编写注释、JSDoc、README 或 docs 文案时，只按当前实现说明，不写历史对比，不解释重构过程，不保留旧架构或旧实现说明；避免出现“由旧方案改为当前方案”“之前使用 A，现在改成 B”“为了兼容旧实现”这类描述。文案优先使用自然、直接、便于阅读的中文，尽量写清用途、位置、规则和使用方式；避免使用“真相源、类型基线、消费边界、职责边界、能力收敛、统一出口”这类抽象术语。"
